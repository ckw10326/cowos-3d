<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CoWoS Interactive — Dual View</title>
<style>
:root {
  --bg: #050810;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --bar-h: 44px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); overflow:hidden; font-family:'Courier New',monospace; }

#tab-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--bar-h);
  background: rgba(5,8,16,0.96);
  border-bottom: 1px solid rgba(0,212,255,0.2);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 0;
  z-index: 999;
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--accent);
  text-shadow: 0 0 10px rgba(0,212,255,0.5);
  margin-right: 24px;
  flex-shrink: 0;
}

.sep { width:1px; height:22px; background:rgba(0,212,255,0.15); margin:0 4px; }

.tab {
  position: relative;
  height: var(--bar-h);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(200,216,240,0.45);
  border: none;
  background: transparent;
  transition: color 0.2s;
  white-space: nowrap;
}
.tab:hover { color: rgba(200,216,240,0.8); }
.tab.active { color: var(--accent); }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}
.tab-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
  opacity: 0.7;
  flex-shrink: 0;
}

.frame-wrap {
  position: fixed;
  top: var(--bar-h);
  left: 0; right: 0; bottom: 0;
  display: none;
}
.frame-wrap.active { display: block; }

iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
</style>
</head>
<body>

<div id="tab-bar">
  <div class="logo">CoWoS</div>
  <div class="sep"></div>
  <button class="tab active" data-target="view-exploded">
    <span class="tab-dot"></span>Exploded View
  </button>
  <button class="tab" data-target="view-3d">
    <span class="tab-dot"></span>3D Structure
  </button>
</div>

<div class="frame-wrap active" id="view-exploded">
  <iframe src="exploded.html" title="CoWoS Exploded View"></iframe>
</div>
<div class="frame-wrap" id="view-3d">
  <iframe src="viewer.html" title="CoWoS 3D Viewer" id="iframe-3d"></iframe>
</div>

<script>
  const tabs = document.querySelectorAll('.tab');
  const frames = document.querySelectorAll('.frame-wrap');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.target;
      tabs.forEach(t => t.classList.remove('active'));
      frames.forEach(f => f.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(target).classList.add('active');
    });
  });
</script>
</body>
</html>
